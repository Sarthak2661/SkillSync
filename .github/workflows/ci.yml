name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-export:
    name: Python 3.13 tests and exports
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check dependency compatibility
        run: python -m pip check

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python modules
        run: python -m compileall -q api dashboard src tests scripts airflow pipeline.py scheduler.py export_powerbi.py

      - name: Run deterministic ETL pipeline
        env:
          MARKET_INTEL_LOAD_TO_POSTGRES: 'false'
          MARKET_INTEL_JOB_SOURCE_MODE: seed
          MARKET_INTEL_COURSE_SOURCE_MODE: open_catalog
          MARKET_INTEL_COURSE_SOURCE_LIMIT: '25'
          MARKET_INTEL_SCHEDULER_RUN_ON_START: 'false'
        run: python pipeline.py

      - name: Export Power BI model
        run: python export_powerbi.py

      - name: Run smoke check
        run: python scripts/smoke_check.py

      - name: Upload Power BI CSV model
        uses: actions/upload-artifact@v6
        with:
          name: skillsync-powerbi-csvs
          path: powerbi/export/*.csv
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: test-and-export

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Compose files
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.airflow.yml --profile airflow config --quiet

      - name: Build SkillSync application image
        run: docker build --tag skillsync:ci .

      - name: Build Next.js frontend image
        run: docker build --tag skillsync-frontend:ci ./frontend

  frontend:
    name: Next.js frontend validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build production frontend
        working-directory: frontend
        run: npm run build

  dbt:
    name: PostgreSQL and dbt validation
    runs-on: ubuntu-latest
    needs: test-and-export

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_market_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d job_market_intel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MARKET_INTEL_DB_URL: postgresql://postgres:postgres@localhost:5432/job_market_intel
      MARKET_INTEL_LOAD_TO_POSTGRES: 'true'
      MARKET_INTEL_JOB_SOURCE_MODE: curated
      MARKET_INTEL_COURSE_SOURCE_MODE: hybrid
      MARKET_INTEL_SCHEDULER_RUN_ON_START: 'false'
      DBT_POSTGRES_HOST: localhost
      DBT_POSTGRES_PORT: '5432'
      DBT_POSTGRES_USER: postgres
      DBT_POSTGRES_PASSWORD: postgres
      DBT_POSTGRES_DB: job_market_intel
      DBT_PROFILES_DIR: dbt

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install pipeline and dbt dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dbt.txt

      - name: Load deterministic warehouse data
        run: python pipeline.py

      - name: Build and test dbt project
        run: dbt build --project-dir dbt --profiles-dir dbt
