name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-export:
    name: Python 3.13 tests and exports
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check dependency compatibility
        run: python -m pip check

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python modules
        run: python -m compileall -q api dashboard src tests scripts airflow pipeline.py scheduler.py export_powerbi.py

      - name: Run deterministic ETL pipeline
        env:
          MARKET_INTEL_LOAD_TO_POSTGRES: 'false'
          MARKET_INTEL_JOB_SOURCE_MODE: seed
          MARKET_INTEL_COURSE_SOURCE_MODE: open_catalog
          MARKET_INTEL_COURSE_SOURCE_LIMIT: '25'
          MARKET_INTEL_SCHEDULER_RUN_ON_START: 'false'
        run: python pipeline.py

      - name: Export Power BI model
        run: python export_powerbi.py

      - name: Run smoke check
        run: python scripts/smoke_check.py

      - name: Upload Power BI CSV model
        uses: actions/upload-artifact@v6
        with:
          name: skillsync-powerbi-csvs
          path: powerbi/export/*.csv
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: test-and-export

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate Compose files
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.airflow.yml --profile airflow config --quiet

      - name: Build SkillSync application image
        run: docker build --tag skillsync:ci .