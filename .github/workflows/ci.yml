name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python modules
        run: python -m compileall api dashboard src tests scripts pipeline.py scheduler.py export_powerbi.py

      - name: Run offline ETL smoke pipeline
        env:
          MARKET_INTEL_LOAD_TO_POSTGRES: 'false'
          MARKET_INTEL_JOB_SOURCE_MODE: seed
          MARKET_INTEL_COURSE_SOURCE_MODE: open_catalog
          MARKET_INTEL_COURSE_SOURCE_LIMIT: '25'
          MARKET_INTEL_SCHEDULER_RUN_ON_START: 'false'
        run: |
          python pipeline.py
          python export_powerbi.py
          python scripts/smoke_check.py